<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="description" content="HMI Operador - Cupula Celestial C-UAS - Ministerio de Defensa" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- CSP estricta. unsafe-eval requerido por CesiumJS Workers. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-eval' blob:;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https:;
      font-src 'self' data:;
      connect-src 'self' ws: wss: http://127.0.0.1:* https://api.cesium.com https://assets.ion.cesium.com;
      worker-src 'self' blob:;
      child-src 'self' blob:;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="no-referrer" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <title>Cupula Celestial - HMI Operador</title>
  </head>
  <body class="bg-bg-base text-text-primary antialiased">
    <div id="root" role="application" aria-label="HMI Operador Cupula Celestial"></div>
    <noscript>
      <div style="padding:2rem;color:#fff;background:#0a0e14;font-family:sans-serif">
        Esta aplicacion requiere JavaScript habilitado.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
