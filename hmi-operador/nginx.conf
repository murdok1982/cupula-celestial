# =====================================================================
# nginx config para HMI Operador
# Cabeceras de seguridad estrictas + SPA fallback
# =====================================================================

server {
    listen 8443;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Limites
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Cabeceras de seguridad
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Healthcheck simple
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Assets con hash: cache largo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Cesium workers / assets
    location /cesium/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Bloquear archivos sensibles
    location ~ /\.(env|git|ht|svn) {
        deny all;
        return 404;
    }
}
