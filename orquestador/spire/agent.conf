# ===========================================================================
# SPIRE Agent — template de configuración.
#
# Usar una instancia por host/nodo. En PoC, una por servicio.
# ===========================================================================

agent {
    server_address      = "spire-server"
    server_port         = 8081
    trust_domain        = "cupula.local"
    data_dir            = "/var/lib/spire"
    log_level           = "INFO"

    # En producción: usar join token generado por spire-server token generate
    # join_token         = "<token>"
}

plugins {
    KeyManager "disk" {
        plugin_data {
            keys_path = "/var/lib/spire/keys.json"
        }
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }
}

health_check {
    listener_enabled = true
    bind_address     = "0.0.0.0"
    bind_port        = 9808
}
