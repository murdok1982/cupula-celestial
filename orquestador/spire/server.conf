# ===========================================================================
# SPIRE Server — configuración para Cúpula Celestial.
#
# Trust Domain: cupula.local
# Usa CA raíz interna de mtls/ como upstream authority.
# ===========================================================================

server {
    bind_address         = "0.0.0.0"
    bind_port            = 8081
    log_level            = "INFO"
    trust_domain         = "cupula.local"
    data_dir             = "/var/lib/spire"
    ca_key_type          = "rsa-2048"
    ca_ttl               = "8760h"
    svid_ttl             = "24h"

    # Upstream CA — delegar firma a la CA raíz interna del proyecto
    # Descomentar cuando mtls/certs esté disponible:
    # upstream_authority {
    #     plugin "upstream_x509ca" {
    #         plugin_cmd = "/usr/local/bin/spire-upstream-x509"
    #         plugin_data {
    #             ca_cert_path   = "/run/spire/ca.crt"
    #             ca_key_path    = "/run/spire/ca.key"
    #         }
    #     }
    # }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            database_path = "/var/lib/spire/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/var/lib/spire/keys.json"
        }
    }
}
