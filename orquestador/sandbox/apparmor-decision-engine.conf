#include <tunables/global>

# AppArmor profile para decision-engine — Cúpula Celestial FASE 2.
# - Read-only en /etc, /usr, /opt
# - Write SÓLO en /tmp y /app/logs
# - Sin acceso de red salvo localhost + ollama + opa + redis + redpanda + audit-log

profile cupula-decision-engine flags=(attach_disconnected,mediate_deleted) {
  #include <abstractions/base>
  #include <abstractions/python>
  #include <abstractions/openssl>
  #include <abstractions/nameservice>

  # Read-only filesystem
  /etc/** r,
  /usr/** r,
  /opt/** r,
  /app/** r,

  # Python venv interpreter
  /usr/local/bin/python* ix,
  /usr/bin/python* ix,
  /app/.venv/bin/python* ix,

  # Write zones
  /tmp/** rw,
  /app/logs/** rw,
  /var/log/decision-engine/** rw,

  # Network — solo egress controlada por destinos legítimos:
  network inet tcp,
  network inet udp,
  # AppArmor 4.0+ permite peer rules; documentamos políticas adyacentes en SELinux
  # cuando se promueva a producción.

  # Denegaciones explícitas
  deny /proc/sysrq-trigger w,
  deny /sys/kernel/** w,
  deny /sys/firmware/** rwklx,
  deny capability sys_admin,
  deny capability sys_module,
  deny capability sys_rawio,
  deny capability sys_boot,
  deny capability mac_override,
  deny capability mac_admin,
  deny mount,
  deny umount,
  deny pivot_root,

  # Sólo lectura para certs montados
  /run/mtls/** r,

  signal (receive) peer=unconfined,
  signal (send,receive) peer=cupula-decision-engine,
}
