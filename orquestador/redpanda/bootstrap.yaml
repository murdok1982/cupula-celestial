# ===========================================================================
# Redpanda bootstrap.yaml — configuración SASL/SCRAM-SHA-256 + TLS.
# Cúpula Celestial FASE 2 — producción.
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PRODUCCIÓN: este archivo activa SASL_SCRAM + TLS.                     ║
# ║  PoC: cambiar Kafka protocol a PLAINTEXT (ver abajo).                  ║
# ╚══════════════════════════════════════════════════════════════════════════╝
# ===========================================================================

# --- TLS ---
redpanda:
  tls:
    key_file: /etc/redpanda/certs/redpanda.key
    cert_file: /etc/redpanda/certs/redpanda.crt
    truststore_file: /etc/redpanda/certs/ca.crt
  kafka_api:
    - name: sasl_tls
      address: 0.0.0.0
      port: 9093
      authentication_method: sasl
      sasl_mechanisms:
        - SCRAM-SHA-256
      tls:
        key_file: /etc/redpanda/certs/redpanda.key
        cert_file: /etc/redpanda/certs/redpanda.crt
        truststore_file: /etc/redpanda/certs/ca.crt
        enabled: true
        require_client_auth: true
  pandaproxy:
    tls:
      key_file: /etc/redpanda/certs/redpanda.key
      cert_file: /etc/redpanda/certs/redpanda.crt
      truststore_file: /etc/redpanda/certs/ca.crt
      enabled: true
  rpc_server:
    tls:
      key_file: /etc/redpanda/certs/redpanda.key
      cert_file: /etc/redpanda/certs/redpanda.crt
      truststore_file: /etc/redpanda/certs/ca.crt
      enabled: true
  auto_create_topics_enabled: false

# --- Superusuarios ---
superusers:
  - admin

# --- Usuarios SCRAM ---
