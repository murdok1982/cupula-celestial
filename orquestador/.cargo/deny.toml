# cargo-deny config — Cúpula Celestial FASE 2
# Política estricta: bloquea CVEs HIGH+, licencias no compatibles, dependencias
# yanked, fuentes no whitelisted.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "EUPL-1.2",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
  # Bibliotecas legacy / problemáticas:
  { name = "openssl", reason = "preferimos rustls" },
  { name = "md5", reason = "obsoleta" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
